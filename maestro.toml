[project]
repo = "CarlosDanielDev/maestro"
base_branch = "main"

[sessions]
max_concurrent = 3
stall_timeout_secs = 300
default_model = "opus"
default_mode = "orchestrator"
permission_mode = "bypassPermissions"  # Options: default, acceptEdits, bypassPermissions, dontAsk, plan, auto
allowed_tools = []                      # Empty = all tools. Example: ["Bash", "Read", "Write", "Edit"]
# guardrail_prompt = "..."              # Custom guardrail injected into every session prompt
                                        # If unset, auto-detected from project language (Rust/TS/Python/Go)

[sessions.context_overflow]
overflow_threshold_pct = 70             # Context % at which auto-fork triggers
auto_fork = true                        # Whether to auto-fork on overflow
commit_prompt_pct = 50                  # Context % at which to prompt a commit
max_fork_depth = 5                      # Maximum fork chain depth

[budget]
per_session_usd = 5.0
total_usd = 50.0
alert_threshold_pct = 80

[github]
issue_filter_labels = ["maestro:ready"]
auto_pr = true

[notifications]
desktop = true
slack = false
# slack_webhook_url = "https://hooks.slack.com/services/T.../B.../xxx"
# slack_rate_limit_per_min = 10

[models]
# Model routing rules: label pattern -> model name. First match wins.
# routing = { "priority:P0" = "opus", "type:docs" = "haiku" }

[sessions.completion_gates]
enabled = true

[[sessions.completion_gates.commands]]
name = "fmt"
run = "cargo fmt --check"
required = true

[[sessions.completion_gates.commands]]
name = "clippy"
run = "cargo clippy -- -D warnings"
required = true

[[sessions.completion_gates.commands]]
name = "test"
run = "cargo test"
required = true

[gates]
enabled = true
test_command = "cargo test"

[review]
enabled = false
command = "gh pr review {pr_number} --comment --body 'Automated review by Maestro'"
auto_approve = false

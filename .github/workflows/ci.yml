name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --verbose
      # Snapshot enforcement: fails if any insta snapshot has an unreviewed diff.
      # Run `cargo insta review` locally to approve snapshot changes before pushing.
      - name: Check snapshots
        env:
          INSTA_UPDATE: "no"
        run: cargo test --verbose 2>&1 | (! grep -q "pending snapshots")

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings -A dead_code

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  file-size:
    name: File Size Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-file-size.sh

  deny:
    # Supply-chain gate: advisories, wildcards, licenses, registries.
    # Ignore list for transitive-only unmaintained advisories is documented
    # in deny.toml with RUSTSEC links. See docs/RUST-GUARDRAILS.md section 9.
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  audit:
    # Advisory scan against the RustSec database. Ignores the same transitive
    # unmaintained advisories as deny.toml — we can't upgrade without upstream
    # ratatui / syntect / reqwest moving first.
    #
    # Cargo.lock is .gitignored (binary-crate convention in this repo), so we
    # generate it on the runner before the audit-check action runs.
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo generate-lockfile
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2025-0141,RUSTSEC-2024-0436,RUSTSEC-2024-0320,RUSTSEC-2026-0097,RUSTSEC-2026-0098,RUSTSEC-2026-0099,RUSTSEC-2026-0104

  coverage:
    # Wave 2.1 — report mode during baseline phase.
    # The script exits 0 by default (report mode) — it prints tier
    # percentages and VIOLATION lines for visibility but keeps the CI
    # check green. Activation is adding `--enforce` to the final script
    # invocation below, which flips the script to strict-exit mode.
    # Activate once baseline reaches the floor for a tier; each tier
    # activation is a dedicated PR.
    name: Coverage Tiers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install yq (Mike Farah Go-based, not Python apt package)
        # Ubuntu's apt `yq` is the Python jq-wrapper, which has a different
        # CLI from the Go-based Mike Farah yq used by check-coverage-tiers.sh.
        # Install the Go binary directly.
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate lcov
        run: cargo llvm-cov --workspace --lcov --output-path coverage.lcov
      - name: Check coverage tiers
        run: bash scripts/check-coverage-tiers.sh coverage.lcov

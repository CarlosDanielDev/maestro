name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="maestro-${TAG}-${{ matrix.target }}.tar.gz"
          OUT_DIR=$(find target/${{ matrix.target }}/release/build -path "*/maestro-*/out" -type d 2>/dev/null | head -1)
          mkdir -p staging
          cp target/${{ matrix.target }}/release/maestro staging/
          if [ -n "${OUT_DIR}" ]; then
            cp "${OUT_DIR}/man/maestro.1" staging/ 2>/dev/null || true
            cp -r "${OUT_DIR}/completions" staging/ 2>/dev/null || true
          fi
          tar czf "${ARCHIVE}" -C staging .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: maestro-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        id: checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/sha256sums.txt

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    env:
      TAG_REF: ${{ github.ref }}
      REPO_NAME: ${{ github.repository }}
    steps:
      - name: Compute checksums from release assets
        id: shas
        run: |
          TAG="${TAG_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${REPO_NAME}/releases/download/${TAG}"

          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu; do
            FILE="maestro-${TAG}-${target}.tar.gz"
            echo "Downloading ${FILE}..."
            curl -sL --retry 5 --retry-delay 3 -o "${FILE}" "${BASE_URL}/${FILE}"
            if [ ! -s "${FILE}" ]; then
              echo "::error::Failed to download ${FILE}"
              exit 1
            fi
          done

          {
            echo "sha_aarch64=$(sha256sum "maestro-${TAG}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')"
            echo "sha_x86_64_mac=$(sha256sum "maestro-${TAG}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')"
            echo "sha_linux=$(sha256sum "maestro-${TAG}-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')"
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "base_url=${BASE_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: CarlosDanielDev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ steps.shas.outputs.version }}
          TAG: ${{ steps.shas.outputs.tag }}
          BASE_URL: ${{ steps.shas.outputs.base_url }}
          SHA_AARCH64: ${{ steps.shas.outputs.sha_aarch64 }}
          SHA_X86_64_MAC: ${{ steps.shas.outputs.sha_x86_64_mac }}
          SHA_LINUX: ${{ steps.shas.outputs.sha_linux }}
        run: |
          cat > homebrew-tap/Formula/maestro.rb << EOF
          class Maestro < Formula
            desc "Multi-session Claude Code orchestrator with Matrix-style TUI"
            homepage "https://github.com/CarlosDanielDev/maestro"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/maestro-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64}"
              else
                url "${BASE_URL}/maestro-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_MAC}"
              end
            end

            on_linux do
              url "${BASE_URL}/maestro-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "maestro"
            end

            test do
              assert_match "maestro", shell_output("#{bin}/maestro --help")
            end
          end
          EOF

          # Remove heredoc indentation (10 spaces)
          sed -i 's/^          //' homebrew-tap/Formula/maestro.rb

          echo "=== Generated formula ==="
          cat homebrew-tap/Formula/maestro.rb

      - name: Commit and push formula
        env:
          VERSION: ${{ steps.shas.outputs.version }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/maestro.rb
          git diff --cached --quiet && echo "No changes to formula" && exit 0
          git commit -m "feat: update maestro to ${VERSION}"
          git push

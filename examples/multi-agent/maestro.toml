[project]
repo = "owner/repo"
base_branch = "main"

[sessions]
max_concurrent = 3
stall_timeout_secs = 300
default_model = "opus"
default_mode = "orchestrator"
permission_mode = "bypassPermissions"
allowed_tools = []

[agents]
default = "claude"

[agents.claude]
kind = "claude"
enabled = true
command = "claude"
model = "opus"
permission_mode = "bypassPermissions"
allowed_tools = []

[agents.codex]
kind = "codex"
enabled = false
command = "codex"
model = "gpt-5.4-codex"
permission_mode = "yolo"
sandbox = "workspace-write"
json = true
ephemeral = false
extra_args = []

[agents.qwen]
kind = "qwen"
enabled = false
command = "qwen"
model = "qwen-test"
extra_args = ["--auth-type", "openai"]

[agents.qwen.env]
OPENAI_BASE_URL = "https://api.example.com/v1"

[agents.opencode]
kind = "opencode"
enabled = false
command = "opencode"
model = "openrouter/deepseek/deepseek-chat"
extra_args = []

[agents.ollama]
kind = "ollama"
enabled = false
model = "qwen3"
base_url = "http://localhost:11434"
request_timeout_secs = 120

[agents.minimax]
kind = "minimax"
enabled = false
model = "MiniMax-M2.7"
base_url = "https://api.minimax.io/v1"
request_timeout_secs = 120
api_key_env = "MINIMAX_API_KEY"

[budget]
per_session_usd = 5.0
total_usd = 50.0
alert_threshold_pct = 80

[notifications]
desktop = true
slack = false
slack_rate_limit_per_min = 10

[provider]
kind = "github"
issue_filter_labels = ["maestro:ready"]
auto_pr = true
auto_merge = false
merge_method = "squash"
cache_ttl_secs = 300

[gates]
fmt = "cargo fmt -- --check"
clippy = "cargo clippy -- -D warnings"
test = "cargo test"

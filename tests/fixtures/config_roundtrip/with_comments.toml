# Project configuration for maestro
# Managed by: ops team
[project]
repo = "owner/repo"
base_branch = "main"

# Session limits and defaults
[sessions]
max_concurrent = 3
stall_timeout_secs = 300 # seconds; increase for slow LLMs
default_model = "opus"
default_mode = "orchestrator"
permission_mode = "bypassPermissions"
allowed_tools = []
max_retries = 2
retry_cooldown_secs = 60
max_prompt_history = 100

[sessions.hollow_retry]
policy = "intent-aware"
work_max_retries = 2
consultation_max_retries = 0

[sessions.context_overflow]
overflow_threshold_pct = 70 # trigger fork at 70 %
auto_fork = true
commit_prompt_pct = 50
max_fork_depth = 5

[sessions.conflict]
enabled = true
policy = "warn"

[sessions.completion_gates]
enabled = true
commands = []

# Financial guardrails
[budget]
per_session_usd = 5.0
total_usd = 50.0
alert_threshold_pct = 80 # notify at 80 %

[github]
issue_filter_labels = ["maestro:ready"]
auto_pr = true
cache_ttl_secs = 300
auto_merge = false
merge_method = "merge"

[notifications]
desktop = true
slack = false
slack_rate_limit_per_min = 10
